name: CoinSteps CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend tests and linting
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio flake8 black

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: black --check . || true

    - name: Run tests
      env:
        MONGODB_URL: mongodb://localhost:27017/test
        JWT_SECRET_KEY: test-secret-key
        WALLET_ENCRYPTION_KEY: test-32-char-encryption-key
      run: |
        pytest --asyncio-mode=auto -v || echo "No tests yet"

  # Frontend linting and type checking
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit || true

    - name: Lint (if configured)
      run: npm run lint || echo "No lint script"

  # Docker build verification
  docker-ci:
    runs-on: ubuntu-latest
    needs: [backend-ci]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: coinsteps-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker Compose
      run: |
        docker compose config

  # Deploy to production (only on main branch)
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Add your deployment commands here"
        # Example: Deploy to AWS, GCP, DigitalOcean, etc.
        # - Configure SSH keys
        # - Run deployment scripts
        # - Update Docker containers
