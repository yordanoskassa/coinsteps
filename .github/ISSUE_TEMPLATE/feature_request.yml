---
name: Feature Request
description: Suggest a new feature for CoinSteps
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: I'm frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see?
    validations:
      required: true
  - type: checkboxes
    id: areas
    attributes:
      label: Affected Areas
      options:
        - label: Mobile App (iOS/Android)
        - label: Backend API
        - label: Blockchain/Solana
        - label: AI Features
