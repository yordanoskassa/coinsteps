---
name: Bug Report
description: Report a bug in the app or backend
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve CoinSteps!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
      placeholder: Describe the bug you encountered
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open app
        2. Go to '...'
        3. Click '...'
        4. See error
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Backend API
  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Any relevant logs or error messages
      render: shell
